{{ define "content" }}
        
<div class="content">
    <!-- Query template -->
    <template id="query-template">
        <div class="query-instance">
            <select class="model-select" name="model" hx-get="/vendors/" hx-trigger="load" hx-target="this">
                <option value="">Select Model</option>
            </select>
            <select class="pattern-select" name="pattern" hx-get="/patterns/" hx-trigger="load" hx-target="this">
                <option value="">Select Pattern</option>
            </select>
            <div class="pattern-content"
                hx-get="/patterns/"
                hx-trigger="change from:.pattern-select"
                hx-target="this">
                Select a pattern to view its content
            </div>
            <div class="model-options">
                <label>Temperature: <input type="number" name="temperature" value="0.7" min="0" max="1" step="0.1"></label>
                <label>Top P: <input type="number" name="top_p" value="0.9" min="0" max="1" step="0.1"></label>
                <label>Presence Penalty: <input type="number" name="presence_penalty" value="0" min="0" max="1" step="0.1"></label>
                <label>Frequency Penalty: <input type="number" name="frequency_penalty" value="0" min="0" max="1" step="0.1"></label>
                <label>Stream: <input type="checkbox" name="stream" value="true"></label>
            </div>
            <textarea class="user-query" placeholder="Enter your query"></textarea>
            <button class="remove-query" _="on click remove the closest .query-instance">Remove</button>
        </div>
    </template>

    <!-- Initial query instance -->
    <div id="query-container">
        <div class="query-instance">
            <select class="model-select" name="model" hx-get="/vendors/*" hx-trigger="load" hx-target="this">
                <option value="">Select Model</option>
            </select>
            <select class="pattern-select" name="pattern" hx-get="/patterns" hx-trigger="load" hx-target="this">
                <option value="">Select Pattern</option>
            </select>
            <div class="pattern-content" 
                hx-get="/patterns/"
                hx-trigger="change from:.pattern-select"
                hx-target="this">
                Select a pattern to view its content
            </div>
            <div class="model-options">
                <label>Temperature: <input type="number" name="temperature" value="0.7" min="0" max="1" step="0.1"></label>
                <label>Top P: <input type="number" name="top_p" value="0.9" min="0" max="1" step="0.1"></label>
                <label>Presence Penalty: <input type="number" name="presence_penalty" value="0" min="0" max="1" step="0.1"></label>
                <label>Frequency Penalty: <input type="number" name="frequency_penalty" value="0" min="0" max="1" step="0.1"></label>
                <label>Stream: <input type="checkbox" name="stream" value="true"></label>
            </div>
            <textarea class="user-query" placeholder="Enter your query"></textarea>
        </div>
    </div>
</div>

<button id="add-query" _="on click call addQuery()">Add Query</button>
<button id="send-queries"
        hx-post="/chat" 
        hx-trigger="click" 
        hx-target="#response" 
        hx-indicator="#spinner">
    Send
</button>
<div id="spinner" class="htmx-indicator">
    Loading...
</div>
<br><br>        
<div id="response-container">
    <h3>Response:</h3>
    <div id="response"></div>
    <br>
</div>

    <script>
        function addQuery() {
            const template = document.getElementById('query-template');
            const queryContainer = document.getElementById('query-container');
            const newQuery = template.content.cloneNode(true);
            queryContainer.appendChild(newQuery);
            htmx.process(queryContainer.lastElementChild);
        }

        htmx.onLoad(function(content) {
            if (content.id === 'response') {
                try {
                    const response = JSON.parse(content.innerHTML);
                    if (response.error) {
                        content.innerHTML = `<div class="error">${response.error}</div>`;
                    } else {
                        content.innerHTML = response.map((r, index) => `
                            <div class="response-item">
                                <h4>Response ${index + 1}:</h4>
                                <pre>${r}</pre>
                            </div>
                        `).join('');
                    }
                } catch (e) {
                    console.error("Failed to parse response:", e);
                    content.innerHTML = `<div class="error">Failed to parse response: ${e.message}</div>`;
                }
            }
        });

        document.addEventListener('change', function(event) {
            if (event.target.classList.contains('pattern-select')) {
                const queryInstance = event.target.closest('.query-instance');
                const patternSelect = queryInstance.querySelector('.pattern-select');
                const patternContent = queryInstance.querySelector('.pattern-content');
                const patternValue = patternSelect.value;
        
                patternContent.setAttribute('hx-get', `/patterns/${patternValue}`);
                htmx.trigger(patternContent, 'change');
            }
        });

        htmx.on('htmx:configRequest', function(event) {
            if (event.detail.elt.id === 'send-queries') {
                const queryInstances = document.querySelectorAll('.query-instance');
                const queries = Array.from(queryInstances).map(instance => ({
                    model: instance.querySelector('.model-select').value,
                    pattern: instance.querySelector('.pattern-select').value,
                    query: instance.querySelector('.user-query').value,
                    options: {
                        temperature: parseFloat(instance.querySelector('[name="temperature"]').value),
                        top_p: parseFloat(instance.querySelector('[name="top_p"]').value),
                        presence_penalty: parseFloat(instance.querySelector('[name="presence_penalty"]').value),
                        frequency_penalty: parseFloat(instance.querySelector('[name="frequency_penalty"]').value),
                        stream: instance.querySelector('[name="stream"]').checked
                    }
                }));
                event.detail.headers['Content-Type'] = 'application/json';
                event.detail.body = JSON.stringify(queries);
            }
        });

        htmx.on('htmx:afterRequest', function(event) {
            if (event.detail.elt.id === 'send-queries') {
                if (event.detail.failed) {
                    const responseContainer = document.getElementById('response');
                    responseContainer.innerHTML = `<div class="error">Request failed: ${event.detail.xhr.status} ${event.detail.xhr.statusText}</div>`;
                }
            }
        });
    </script>
{{ end }}
